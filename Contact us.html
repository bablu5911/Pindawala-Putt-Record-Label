<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Pindawala Putt</title>
    <link rel="stylesheet" href="style 3.css">
</head>

<body>

    <header>
        <h3 class="logo">Pindawala Putt</h3>
        <nav>
            <ul>
                <li><a href="Index.html">Home</a></li>
                <li><a href="Video Pages.html">Releases</a></li>
                <li><a href="AboutArtist.html">About Artist</a></li>
                <li><a href="EPK.html">EPK</a></li>
                <li><a href="https://www.youtube.com/@pindawalaputt">Youtube</a></li>
                <li><a href="Streaming Platform.html">Streaming Platforms</a></li>
                <li><a href="Contact us.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-layout">
        <div class="left-column">
            <section class="contact-form">
                <h2>Send Us a Message</h2>

                <form action="https://api.web3forms.com/submit" method="POST">
                    <input type="hidden" name="access_key" value="b4263795-34f5-4b04-8878-fdcd197270c0">
                    <input type="hidden" name="from_name" value="Pindawala Putt Website">

                    <label for="name">Full Name:</label>
                    <input type="text" id="name" name="Sender Name" required>

                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email" required>

                    <label for="subject">Subject / Purpose:</label>
                    <select id="subject" name="subject" required>
                        <option value="" disabled selected>-- Select an option --</option>
                        <option value="Music Collaboration">Music Collaboration</option>
                        <option value="Business & Booking">Business & Booking</option>
                        <option value="Song Request">Song Request</option>
                        <option value="Press & Media">Press & Media</option>
                        <option value="Other">Other</option>
                    </select>

                    <label for="message">Message:</label>
                    <textarea id="message" name="Message Content" rows="5" required></textarea>

                    <input type="hidden" name="redirect" value="https://yourwebsite.com/Contact us.html">

                    <button type="submit">Send Message</button>
                </form>
            </section>
        </div>

        <div class="right-column">
            <div class="video-container">
                <video autoplay loop muted playsinline class="aesthetic-video">
                    <source src="resource/Other videos/Sidhu Edits.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
        </div>
    </main>

</body>

</html>
